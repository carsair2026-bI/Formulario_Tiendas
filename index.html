<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Gestión</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body{font-family:Arial;max-width:900px;margin:auto;padding:20px}
label{display:block;margin-top:12px;font-weight:bold}
select,input{width:100%;padding:8px;margin-top:5px}
button{margin-top:20px;padding:10px}
</style>

</head>

<body>

<h2>Formulario Gestión Comercial</h2>

<form id="form">

<label>Región</label>
<select id="region"></select>

<label>Tienda</label>
<select id="tienda"></select>

<label>Vendedor</label>
<select id="vendedor"></select>

<label>Tipo Documento</label>
<select id="tipo_doc">
<option>DNI</option>
<option>RUC</option>
<option>Pasaporte</option>
<option>Otro</option>
</select>

<input id="tipo_doc_otro" placeholder="Especifique otro" style="display:none">

<label>Número Documento</label>
<input id="num_doc">

<label>Base Cliente</label>
<select id="base">
<option>Base Credialtoque</option>
<option>Piloto Televentas</option>
<option>Base Recompra</option>
<option>Base Aprobados sin compra</option>
<option>Base CAMPAÑA ELECTRO</option>
<option>Base LINEAS APROBADAS</option>
<option>Base CREDICASH</option>
</select>

<label>Tipo Gestión</label>
<select id="gestion">
<option>Telefónica y/o Whatsapp</option>
<option>Visita terrena</option>
<option>Otro</option>
</select>

<input id="gestion_otro" placeholder="Especifique" style="display:none">

<label>Resultado</label>
<select id="resultado">
<option>Cliente se acercará a tienda a compra</option>
<option>Cliente no contesta</option>
<option>Cliente no se le ubica en vivienda</option>
<option>Cliente no desea, por tasa</option>
<option>Cliente no desea, no cuenta con inicial</option>
<option>Fuera zona</option>
<option>Cliente compro al contado</option>
<option>Teléfono fuera de servicio / errado</option>
<option>No pertenece a la zona</option>
<option>Otro</option>
</select>

<input id="resultado_otro" placeholder="Especifique" style="display:none">

<button type="submit">Guardar</button>

</form>

<script>

const MAESTRO =
"https://docs.google.com/spreadsheets/d/1xhk8m9Uv6jVZobdc3txeK9qfiv7mVmVXCbgO-p9T78Y/export?format=csv&gid=0";

const API =
"PEGA_AQUI_TU_WEB_APP_URL";

let datos = [];

function clean(v){
  return (v || "").toString().trim();
}

Papa.parse(MAESTRO,{
  download:true,
  header:true,
  skipEmptyLines:true,
  complete:(r)=>{

    datos = r.data;

    console.log("MAESTRO CARGADO:", datos);

    let regiones = [...new Set(datos.map(x => clean(x.REG)))];

    region.innerHTML = regiones
      .filter(Boolean)
      .map(r => `<option>${r}</option>`)
      .join("");

    region.selectedIndex = 0;
    cargarTiendas();

  },
  error:(err)=>{
    console.error("ERROR CSV:", err);
  }
});

function cargarTiendas(){

  let reg = clean(region.value);

  let tiendas = [...new Set(
    datos
      .filter(x => clean(x.REG) === reg)
      .map(x => clean(x.TIENDA))
  )];

  tienda.innerHTML = tiendas
    .filter(Boolean)
    .map(t => `<option>${t}</option>`)
    .join("");

  cargarVendedores();
}

function cargarVendedores(){

  let reg = clean(region.value);
  let tie = clean(tienda.value);

  let vend = datos.filter(x =>
    clean(x.REG) === reg &&
    clean(x.TIENDA) === tie
  );

  vendedor.innerHTML = vend.map(v => `
    <option value="${v.ID_VEN}">
      ${v.VENDEDOR}
    </option>
  `).join("");
}

region.onchange = cargarTiendas;
tienda.onchange = cargarVendedores;

tipo_doc.onchange = () => {
  tipo_doc_otro.style.display =
    tipo_doc.value === "Otro" ? "block" : "none";
};

gestion.onchange = () => {
  gestion_otro.style.display =
    gestion.value === "Otro" ? "block" : "none";
};

resultado.onchange = () => {
  resultado_otro.style.display =
    resultado.value === "Otro" ? "block" : "none";
};

form.onsubmit = async (e) => {

  e.preventDefault();

  let v = datos.find(x => x.ID_VEN == vendedor.value);

  if (!v) {
    alert("Error: vendedor no encontrado");
    return;
  }

  let payload = {
    REG: v.REG,
    TIENDA: v.TIENDA,
    VENDEDOR: v.VENDEDOR,
    ID_VEN: v.ID_VEN,
    TIPO_DOCUMENTO: tipo_doc.value,
    NUMERO_DOCUMENTO: num_doc.value,
    BASE_CLIENTE: base.value,
    TIPO_GESTION: gestion.value,
    RESULTADO: resultado.value
  };

  try {

    let res = await fetch(API, {
      method: "POST",
      body: new URLSearchParams(payload)
    });

    console.log(await res.text());

    alert("Guardado correctamente");

    form.reset();

  } catch (err) {
    console.error(err);
    alert("Error al guardar");
  }

};

</script>

</body>
</html>
